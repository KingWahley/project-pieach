<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Stacking Sections</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main>
    
    <section class="panel" style="--bg: #0f172a;">
      <h1>Section One</h1>
    </section>

    <section class="panel" style="--bg: #1e293b;">
      <h1>Section Two</h1>
    </section>

    <section class="panel" style="--bg: #334155;">
      <h1>Section Three</h1>
    </section>

    <section class="panel" style="--bg: #475569;">
      <h1>Section Four</h1>
    </section>
   
  </main>

  <script src="script.js"></script>
</body>
</html>
